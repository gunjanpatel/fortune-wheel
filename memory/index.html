<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Memory Match — Gunjan's Game Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="memory.css" />
</head>
<body class="theme-memory">
  <div class="layout-wrapper">
    <!-- ─── Header ─── -->
    <header class="fixed top-0 left-0 right-0 z-50 h-14 flex items-center">
      <div class="max-w-4xl mx-auto w-full px-5 flex items-center justify-between">
        <a href="/" class="flex items-center gap-2.5 group text-decoration-none">
          <img src="https://gravatar.com/avatar/a71d5c71e4c2236145ec0b8058bf9508?s=400" alt="Gunjan Patel"
            class="w-7 h-7 rounded-full object-cover border border-[rgba(255,255,255,0.1)]" />
          <span class="font-semibold text-sm text-[#f2f2f7]">Gunjan Patel</span>
        </a>
        <nav class="hidden md:flex items-center gap-7">
          <a href="https://gunjanpatel.info/about" class="nav-link">About</a>
          <a href="https://gunjanpatel.info/blog" class="nav-link">Blog</a>
          <a href="https://gunjanpatel.info/yoga" class="nav-link">Yoga</a>
          <div class="nav-dropdown">
            <button class="nav-link nav-dropdown-btn" type="button">Things I Built ▾</button>
            <div class="nav-dropdown-menu">
              <a href="https://learn.gunjanpatel.info">Learn</a>
              <a href="https://shop.gunjanpatel.info">Patel Flours</a>
            </div>
          </div>
          <a href="https://games.gunjanpatel.info" class="nav-link">🎮 Games</a>
        </nav>
        <div class="flex items-center gap-2">
          <a href="https://github.com/gunjanpatel" target="_blank"
            class="text-[rgba(235,235,245,0.50)] hover:text-[#d946ef] transition-colors" title="GitHub">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
            </svg>
          </a>
        </div>
      </div>
    </header>

    <!-- ─── Main Content ─── -->
    <main class="flex-1 pt-20 pb-12 px-5 flex flex-col items-center">
      <!-- SETUP SCREEN -->
      <section id="setupScreen" class="w-full max-w-md mt-8">
        <div class="glass-panel p-8">
          <div class="text-center mb-8">
            <div class="text-5xl mb-3">🧠</div>
            <h1 class="page-title">Memory Match</h1>
            <p class="text-sm text-[rgba(235,235,245,0.50)] mt-1">Train your brain. Match all card pairs!</p>
          </div>
          <button id="startBtn" class="btn-primary w-full justify-center text-base py-3" type="button">
            Start Game ⚡
          </button>
        </div>
      </section>

      <!-- GAME SCREEN -->
      <section id="gameScreen" class="hidden w-full max-w-md mt-6">
        <!-- Stats bar -->
        <div class="score-bar glass-panel px-6 py-4 mb-5 flex items-center justify-between">
          <div>
            <div class="text-xs text-[rgba(235,235,245,0.30)] uppercase tracking-widest font-mono">Flips</div>
            <div class="score-num text-center" id="flipCount">0</div>
          </div>
          <div>
            <div class="text-xs text-[rgba(235,235,245,0.30)] uppercase tracking-widest font-mono">Time</div>
            <div class="score-num text-center" id="timer">0s</div>
          </div>
          <div>
            <div class="text-xs text-[rgba(235,235,245,0.30)] uppercase tracking-widest font-mono">Best Time</div>
            <div class="score-num text-center" id="bestTime">--</div>
          </div>
        </div>

        <!-- Card Grid -->
        <div class="board-wrap glass-panel p-4 mb-5">
          <div class="grid grid-cols-4 gap-3 aspect-square w-full" id="cardGrid">
            <!-- Dynamically populated card blocks -->
          </div>
        </div>

        <!-- Restart Button -->
        <div class="flex gap-3">
          <button id="restartBtn" class="btn-primary flex-1 justify-center" type="button">Restart 🔁</button>
          <button id="homeBtn" class="btn-secondary flex-1 justify-center" type="button">Main Menu</button>
        </div>
      </section>

      <!-- VICTORY OVERLAY -->
      <div id="winOverlay" class="win-overlay hidden">
        <div class="win-card glass-panel">
          <div class="win-emoji">🏆</div>
          <h2 class="win-title">Victory!</h2>
          <p class="win-sub" id="winStats">Matched in 24 flips and 18 seconds!</p>
          <p class="text-xs text-[rgba(235,235,245,0.40)] mt-2" id="newRecordText"></p>
          <div class="flex gap-3 mt-6">
            <button id="overlayRestart" class="btn-primary flex-1 justify-center" type="button">Play Again 🔁</button>
            <button id="overlayHome" class="btn-secondary flex-1 justify-center" type="button">Back to Hub</button>
          </div>
        </div>
      </div>
    </main>

    <!-- ─── Footer ─── -->
    <footer class="mt-auto border-t border-[rgba(255,255,255,0.08)]">
      <div class="max-w-4xl mx-auto px-5 py-12">
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-8">
          <div>
            <p class="font-display font-medium text-lg mb-1 text-[#f2f2f7]">वसुधैव कुटुम्बकम्</p>
            <p class="text-sm italic text-[rgba(235,235,245,0.50)]">The world is one family</p>
          </div>
          <div class="flex items-center gap-6">
            <a href="https://www.linkedin.com/in/jgunjanpatel/" target="_blank" rel="noopener noreferrer"
              class="text-sm font-medium flex items-center gap-1.5 transition-colors text-[rgba(235,235,245,0.50)] hover:text-[#d946ef]">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
                <rect x="2" y="9" width="4" height="12"></rect>
                <circle cx="4" cy="4" r="2"></circle>
              </svg>
              LinkedIn
            </a>
            <a href="https://github.com/gunjanpatel" target="_blank" rel="noopener noreferrer"
              class="text-sm font-medium flex items-center gap-1.5 transition-colors text-[rgba(235,235,245,0.50)] hover:text-[#d946ef]">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
              </svg>
              GitHub
            </a>
          </div>
        </div>
        <p class="mt-10 text-xs text-[rgba(235,235,245,0.25)] font-mono">
          © 2026 GunjanPatel.info — Game Room
        </p>
      </div>
    </footer>
  </div>
  <script src="memory.js"></script>
</body>
</html>
