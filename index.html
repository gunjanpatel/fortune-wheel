<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fortune Wheel</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    canvas { touch-action: none; }
  </style>
</head>

<body class="bg-gray-100">

  <!-- SETUP SCREEN -->
  <div id="setupScreen" class="max-w-xl mx-auto mt-10 p-6 bg-white shadow rounded">
    <h1 class="text-2xl font-bold mb-4">Create Your Spinning Wheel</h1>

    <div id="itemsContainer" class="space-y-2 mb-4"></div>

    <button id="addItemBtn"
      class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
      Add Item
    </button>

    <button id="nextBtn"
      class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600 float-right">
      Next →
    </button>
    <div class="clearfix"></div>
  </div>

  <!-- WHEEL SCREEN -->
  <div id="wheelScreen" class="hidden flex flex-col items-center mt-10">
    <canvas id="wheelCanvas" width="400" height="400"></canvas>

    <button id="spinBtn"
      class="bg-purple-600 text-white mt-6 px-6 py-3 rounded-full hover:bg-purple-700">
      SPIN
    </button>

    <button id="startOverBtn"
      class="bg-gray-500 text-white mt-4 px-4 py-2 rounded hover:bg-gray-600">
      Start Over
    </button>
  </div>

  <!-- WINNER MODAL -->
  <div id="winnerModal"
       class="fixed inset-0 bg-black bg-opacity-50 hidden justify-center items-center">
    <div class="bg-white p-6 rounded shadow text-center">
      <h2 class="text-xl font-bold mb-4">Winner!</h2>
      <p id="winnerText" class="text-3xl font-semibold"></p>

      <button id="closeModalBtn"
        class="bg-blue-500 text-white px-4 py-2 mt-4 rounded hover:bg-blue-600">
        OK
      </button>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="wheel.js"></script>
</body>
</html>
