<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fortune Wheel</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="styles.css?v=20260310" />
</head>

<body class="min-h-dvh bg-[#0d1117] bg-[radial-gradient(circle_at_12%_10%,rgba(56,139,253,0.14),transparent_58%),radial-gradient(circle_at_90%_95%,rgba(35,134,54,0.12),transparent_64%)] p-4 md:p-8 font-[Avenir_Next,Segoe_UI,sans-serif] text-[#c9d1d9] grid place-items-center">

<!-- SETUP SCREEN -->
<section id="setupScreen" class="w-full max-w-2xl rounded-3xl bg-[#161b22]/95 p-5 md:p-8 shadow-[0_28px_60px_rgba(1,4,9,0.7),0_2px_8px_rgba(1,4,9,0.45)] ring-1 ring-[#30363d]">
  <h1 class="mb-4 text-center text-3xl font-bold tracking-tight">Create Your Wheel</h1>

  <div class="mb-4 grid gap-2 sm:grid-cols-[1fr_auto]">
    <select id="presetSelect" class="w-full rounded-xl border border-[#30363d] bg-[#0d1117] px-3 py-2 text-[#c9d1d9] outline-none focus:border-[#1f6feb] focus:ring-4 focus:ring-[#1f6feb]/25">
      <option value="">Choose a preset (optional)</option>
      <option value="birthday-questions">Birthday Party Questionnaire</option>
      <option value="kids-play">Kids Playing Challenges</option>
      <option value="icebreaker-questions">Fun Icebreaker Questions</option>
    </select>
    <button id="applyPresetBtn" class="rounded-full bg-[#8957e5] px-5 py-2.5 text-white font-semibold hover:bg-[#a371f7]" type="button">
      Apply Preset
    </button>
  </div>

  <div id="itemsContainer" class="grid gap-2.5 mb-4"></div>

  <div class="mb-3 flex flex-col gap-2 sm:flex-row">
    <button id="addItemBtn" class="rounded-full bg-[#1f6feb] px-5 py-2.5 text-white font-semibold hover:bg-[#388bfd]" type="button">
      Add One
    </button>

    <button id="toggleBulkBtn" class="rounded-full bg-[#1f6feb] px-5 py-2.5 text-white font-semibold hover:bg-[#388bfd]" type="button">
      Bulk Paste
    </button>
  </div>

  <div id="bulkEntryPanel" class="hidden mb-4 rounded-xl border border-[#30363d] bg-[#0d1117]/70 p-3">
    <textarea id="bulkItemsInput" rows="6" placeholder="One item per line" class="w-full min-h-[120px] resize-y rounded-xl border border-[#30363d] bg-[#0d1117] px-3 py-2 text-[#c9d1d9] placeholder:text-[#8b949e] outline-none focus:border-[#1f6feb] focus:ring-4 focus:ring-[#1f6feb]/25"></textarea>
    <div class="mt-3 flex flex-col gap-2 sm:flex-row">
      <button id="cancelBulkBtn" class="rounded-full bg-[#30363d] px-5 py-2.5 text-[#c9d1d9] font-semibold hover:bg-[#484f58]" type="button">Close</button>
    </div>
  </div>

  <div class="flex justify-end">
    <button id="nextBtn" class="rounded-full bg-[#238636] px-6 py-2.5 text-white font-semibold hover:bg-[#2ea043]">Next →</button>
  </div>
</section>

<!-- WHEEL SCREEN -->
<section id="wheelScreen" class="hidden grid w-full max-w-4xl justify-items-center">
  <div class="mx-auto w-[min(78vmin,640px)]">
    <div class="ui-wheel-of-fortune" id="fortuneWheel">
      <ul id="wheelItems"></ul>
      <button id="spinBtn" type="button" aria-label="Spin the wheel">SPIN</button>
    </div>
  </div>

  <button id="startOverBtn" class="mt-4 rounded-full bg-[#30363d] px-6 py-2.5 text-[#c9d1d9] font-semibold hover:bg-[#484f58]">
    Start Over
  </button>
</section>

<audio id="tickSound" src="assets/tick.mp3"></audio>

<script src="app.js?v=20260310-2"></script>
<script src="wheel.js?v=20260310-2"></script>
</body>
</html>
