<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fortune Wheel</title>
<link rel="stylesheet" href="styles.css" />
</head>

<body>

<!-- SETUP SCREEN -->
<section id="setupScreen" class="panel setup-screen">
  <h1>Create Your Wheel</h1>

  <div id="itemsContainer" class="items-container"></div>

  <button id="addItemBtn" class="btn btn-secondary">
    Add Item
  </button>

  <button id="nextBtn" class="btn btn-primary right">
    Next →
  </button>
</section>

<!-- WHEEL SCREEN -->
<section id="wheelScreen" class="hidden wheel-screen">
  <div class="wheel-shell">
    <div class="ui-wheel-of-fortune" id="fortuneWheel">
      <ul id="wheelItems"></ul>
      <button id="spinBtn" type="button" aria-label="Spin the wheel">SPIN</button>
    </div>
  </div>

  <button id="startOverBtn" class="btn btn-neutral">
    Start Over
  </button>
</section>

<audio id="tickSound" src="tick.mp3"></audio>

<script src="app.js"></script>
<script src="wheel.js"></script>
</body>
</html>
