<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fortune Wheel</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="styles.css" />
</head>

<body class="min-h-dvh bg-slate-950 bg-[radial-gradient(circle_at_12%_10%,rgba(71,85,105,0.35),transparent_58%),radial-gradient(circle_at_90%_95%,rgba(30,41,59,0.55),transparent_64%)] p-4 md:p-8 font-[Avenir_Next,Segoe_UI,sans-serif] text-slate-100 grid place-items-center">

<!-- SETUP SCREEN -->
<section id="setupScreen" class="w-full max-w-2xl rounded-3xl bg-slate-900/90 p-5 md:p-8 shadow-[0_28px_60px_rgba(2,6,23,0.7),0_2px_8px_rgba(2,6,23,0.45)] ring-1 ring-slate-700/60">
  <h1 class="mb-4 text-center text-3xl font-bold tracking-tight">Create Your Wheel</h1>

  <div id="itemsContainer" class="grid gap-2.5 mb-4"></div>

  <div class="mb-3 flex flex-col gap-2 sm:flex-row">
    <button id="addItemBtn" class="rounded-full bg-sky-500 px-5 py-2.5 text-white font-semibold hover:bg-sky-400" type="button">
      Add One
    </button>

    <button id="toggleBulkBtn" class="rounded-full bg-sky-500 px-5 py-2.5 text-white font-semibold hover:bg-sky-400" type="button">
      Bulk Paste
    </button>
  </div>

  <div id="bulkEntryPanel" class="hidden mb-4 rounded-xl border border-slate-700 bg-slate-800/70 p-3">
    <textarea id="bulkItemsInput" rows="6" placeholder="One item per line" class="w-full min-h-[120px] resize-y rounded-xl border border-slate-600 bg-slate-900/90 px-3 py-2 text-slate-100 placeholder:text-slate-400 outline-none focus:border-sky-500 focus:ring-4 focus:ring-sky-500/25"></textarea>
    <div class="mt-3 flex flex-col gap-2 sm:flex-row">
      <button id="cancelBulkBtn" class="rounded-full bg-slate-600 px-5 py-2.5 text-white font-semibold hover:bg-slate-500" type="button">Close</button>
    </div>
  </div>

  <div class="flex justify-end">
    <button id="nextBtn" class="rounded-full bg-emerald-600 px-6 py-2.5 text-white font-semibold hover:bg-emerald-500">Next →</button>
  </div>
</section>

<!-- WHEEL SCREEN -->
<section id="wheelScreen" class="hidden grid w-full max-w-4xl justify-items-center">
  <div class="mx-auto w-[min(78vmin,640px)]">
    <div class="ui-wheel-of-fortune" id="fortuneWheel">
      <ul id="wheelItems"></ul>
      <button id="spinBtn" type="button" aria-label="Spin the wheel">SPIN</button>
    </div>
  </div>

  <button id="startOverBtn" class="mt-4 rounded-full bg-slate-700 px-6 py-2.5 text-white font-semibold hover:bg-slate-600">
    Start Over
  </button>
</section>

<audio id="tickSound" src="tick.mp3"></audio>

<script src="app.js"></script>
<script src="wheel.js"></script>
</body>
</html>
