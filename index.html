<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fortune Wheel</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="styles.css" />
</head>

<body class="min-h-dvh bg-slate-300 bg-[radial-gradient(circle_at_12%_10%,rgba(255,255,255,0.72),transparent_58%),radial-gradient(circle_at_90%_95%,rgba(255,255,255,0.55),transparent_64%)] p-4 md:p-8 font-[Avenir_Next,Segoe_UI,sans-serif] text-slate-900 grid place-items-center">

<!-- SETUP SCREEN -->
<section id="setupScreen" class="w-full max-w-2xl rounded-3xl bg-white/95 p-5 md:p-8 shadow-[0_26px_50px_rgba(20,24,32,0.13),0_2px_6px_rgba(20,24,32,0.08)]">
  <h1 class="mb-4 text-center text-3xl font-bold tracking-tight">Create Your Wheel</h1>

  <div id="itemsContainer" class="grid gap-2.5 mb-4"></div>

  <div class="mb-3 flex flex-col gap-2 sm:flex-row">
    <button id="addItemBtn" class="rounded-full bg-sky-600 px-5 py-2.5 text-white font-semibold hover:bg-sky-700" type="button">
      Add One
    </button>

    <button id="toggleBulkBtn" class="rounded-full bg-sky-600 px-5 py-2.5 text-white font-semibold hover:bg-sky-700" type="button">
      Bulk Paste
    </button>
  </div>

  <div id="bulkEntryPanel" class="hidden mb-4 rounded-xl border border-slate-300 bg-slate-50 p-3">
    <textarea id="bulkItemsInput" rows="6" placeholder="One item per line" class="w-full min-h-[120px] resize-y rounded-xl border border-slate-300 bg-white px-3 py-2 outline-none focus:border-sky-500 focus:ring-4 focus:ring-sky-200"></textarea>
    <div class="mt-3 flex flex-col gap-2 sm:flex-row">
      <button id="cancelBulkBtn" class="rounded-full bg-slate-600 px-5 py-2.5 text-white font-semibold hover:bg-slate-700" type="button">Close</button>
    </div>
  </div>

  <div class="flex justify-end">
    <button id="nextBtn" class="rounded-full bg-emerald-700 px-6 py-2.5 text-white font-semibold hover:bg-emerald-800">Next →</button>
  </div>
</section>

<!-- WHEEL SCREEN -->
<section id="wheelScreen" class="hidden grid w-full max-w-4xl justify-items-center">
  <div class="mx-auto w-[min(78vmin,640px)]">
    <div class="ui-wheel-of-fortune" id="fortuneWheel">
      <ul id="wheelItems"></ul>
      <button id="spinBtn" type="button" aria-label="Spin the wheel">SPIN</button>
    </div>
  </div>

  <button id="startOverBtn" class="mt-4 rounded-full bg-slate-700 px-6 py-2.5 text-white font-semibold hover:bg-slate-800">
    Start Over
  </button>
</section>

<audio id="tickSound" src="tick.mp3"></audio>

<script src="app.js"></script>
<script src="wheel.js"></script>
</body>
</html>
